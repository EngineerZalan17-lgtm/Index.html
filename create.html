<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth System</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background:linear-gradient(135deg,#0f172a,#1e40af,#0ea5e9);
    color:white;
}

.box {
    width:360px;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.12);
    text-align:center;
}

input, select {
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:10px;
}

button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    cursor:pointer;
}

a {
    color:#93c5fd;
    display:block;
    margin-top:10px;
    cursor:pointer;
}

/* pages */
.page { display:none; }
.active { display:block; }
</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="login" class="box page active">
    <h2>Login</h2>

    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPass" placeholder="Password">

    <button onclick="login()">Login</button>

    <a onclick="showPage('create')">Create Account</a>
</div>

<!-- CREATE PAGE -->
<div id="create" class="box page">
    <h2>Create Account</h2>

    <input id="first" placeholder="First Name">
    <input id="last" placeholder="Last Name">
    <input id="email" type="email" placeholder="Email">

    <select>
        <option disabled selected>Select Gender</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
    </select>

    <input id="pass" type="password" placeholder="Password">
    <input id="cpass" type="password" placeholder="Confirm Password">

    <button onclick="createAccount()">Create</button>

    <a onclick="showPage('login')">Back to Login</a>
</div>

<!-- HOME PAGE -->
<div id="home" class="box page">
    <h2>Welcome 🎉</h2>
    <p>You are logged in</p>
    <button onclick="showPage('login')">Logout</button>
</div>

<script>

function showPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(page).classList.add('active');
}

function login() {
    let email = document.getElementById("loginEmail").value;
    let pass = document.getElementById("loginPass").value;

    if(email && pass){
        showPage("home");
    } else {
        alert("Enter login details");
    }
}

function createAccount() {
    let p = document.getElementById("pass").value;
    let cp = document.getElementById("cpass").value;

    if(p !== cp){
        alert("Passwords do not match!");
        return;
    }

    alert("Account created!");
    showPage("login");
}

</script>

</body>
</html>
