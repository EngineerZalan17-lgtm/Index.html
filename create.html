<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Segoe UI, Arial, sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f172a, #1e40af, #0ea5e9);
    color: #f8fafc;
}

.container {
    width: 360px;
    padding: 32px;
    border-radius: 28px;
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.22);
    backdrop-filter: blur(16px);
}

h2 {
    text-align: center;
    margin-bottom: 12px;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: none;
    border-radius: 10px;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #38bdf8;
    cursor: pointer;
    font-weight: bold;
}

a {
    display: block;
    text-align: center;
    margin-top: 12px;
    color: #93c5fd;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <h2>Create Account</h2>

    <input id="first" placeholder="First Name">
    <input id="last" placeholder="Last Name">
    <input id="email" type="email" placeholder="Email">

    <select>
        <option disabled selected>Select Gender</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
    </select>

    <input id="pass" type="password" placeholder="Password">
    <input id="cpass" type="password" placeholder="Confirm Password">

    <button onclick="createAccount()">Create</button>

    <a href="login.html">Back to Login</a>
</div>

<script>
function createAccount() {
    let p = document.getElementById("pass").value;
    let cp = document.getElementById("cpass").value;

    if(!p || !cp){
        alert("Fill all fields");
        return;
    }

    if(p !== cp){
        alert("Passwords do not match!");
        return;
    }

    alert("Account created successfully!");
    window.location.href = "login.html";
}
</script>

</body>
</html>
