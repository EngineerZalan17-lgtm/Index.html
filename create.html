<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>create.html</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Segoe UI, Arial, sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f172a, #1e40af, #0ea5e9);
    color: #f8fafc;
}

.container {
    width: 360px;
    padding: 32px;
    border-radius: 28px;
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.22);
    box-shadow: 0 14px 40px rgba(0, 0, 0, 0.25);
    backdrop-filter: blur(16px);
}

.robot-card {
    display: flex;
    justify-content: center;
    margin-bottom: 18px;
}

.robot-face {
    width: 90px;
    height: 90px;
    border-radius: 28px;
    background: radial-gradient(circle at top, #e2e8f0, #94a3b8);
    position: relative;
    box-shadow: inset 0 6px 12px rgba(255,255,255,0.35),
                0 12px 25px rgba(0,0,0,0.18);
    transition: transform 0.3s ease;
}

.robot-eye {
    position: absolute;
    top: 28px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #0f172a;
}

.robot-eye.left { left: 22px; }
.robot-eye.right { right: 22px; }

.robot-mouth {
    position: absolute;
    bottom: 20px;
    left: 50%;
    width: 38px;
    height: 16px;
    transform: translateX(-50%);
    border-radius: 0 0 999px 999px;
    border-bottom: 4px solid #0f172a;
    transition: 0.3s;
}

.robot-face.smile .robot-mouth {
    width: 50px;
    height: 25px;
    bottom: 16px;
    border-bottom-width: 6px;
}

.robot-face.smile {
    transform: translateY(-3px);
}

h2 {
    text-align: center;
    margin-bottom: 8px;
}

p.subtitle {
    text-align: center;
    color: #cbd5e1;
    margin-bottom: 20px;
    font-size: 14px;
}

.input-box {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    border: none;
    border-radius: 14px;
    background: rgba(255,255,255,0.14);
    color: #fff;
    outline: none;
}

.input-box::placeholder {
    color: #cbd5e1;
}

.button-submit {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #38bdf8, #6366f1);
    color: white;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s;
}

.button-submit:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

.success {
    margin-top: 15px;
    padding: 12px;
    border-radius: 12px;
    text-align: center;
    background: rgba(16,185,129,0.2);
    border: 1px solid rgba(16,185,129,0.4);
    color: #a7f3d0;
    display: none;
}
</style>
</head>

<body>

<div class="container">

    <div class="robot-card">
        <div class="robot-face" id="robotFace">
            <div class="robot-eye left"></div>
            <div class="robot-eye right"></div>
            <div class="robot-mouth"></div>
        </div>
    </div>

    <h2>Create Account</h2>
    <p class="subtitle">Fill all details to continue</p>

    <form id="createForm">

        <input type="text" class="input-box" placeholder="First Name" required>
        <input type="text" class="input-box" placeholder="Last Name" required>
        <input type="email" class="input-box" placeholder="Email" required>
        <input type="password" class="input-box" placeholder="Password" required>
        <input type="password" class="input-box" placeholder="Confirm Password" required>

        <button class="button-submit" type="submit">Create Account</button>
    </form>

    <div class="success" id="successMsg">
        🎉 Account Created Successfully! Thank you for joining 💙
    </div>

</div>

<script>
const form = document.getElementById("createForm");
const robotFace = document.getElementById("robotFace");
const successMsg = document.getElementById("successMsg");

form.addEventListener("submit", function(e){
    e.preventDefault();

    robotFace.classList.add("smile");
    successMsg.style.display = "block";

    setTimeout(() => {
        window.location.href = "create.html"; 
    }, 2000);
});
</script>

</body>
</html>
