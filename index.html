<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In | Secure Portal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        -45deg,
        #0f172a,
        #1e40af,
        #06b6d4,
        #8b5cf6
    );
    background-size:400% 400%;
    animation:moveBg 12s ease infinite;
}

@keyframes moveBg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.login-box{
    width:380px;
    padding:35px 30px;
    border-radius:32px;
    background:rgba(255,255,255,0.16);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.25);
    box-shadow:0 8px 30px rgba(0,0,0,0.28);
    transition:0.4s;
}

.brand-icon{
    width:75px;
    height:75px;
    margin:0 auto 20px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg, rgba(255,255,255,0.95), rgba(249,115,22,0.95));
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    font-size:36px;
}

.login-box:hover{
    transform:translateY(-5px);
    background:rgba(255,255,255,0.22);
}

.input-group{
    position:relative;
}

.password-toggle{
    position:absolute;
    top:50%;
    right:16px;
    transform:translateY(-50%);
    width:32px;
    height:32px;
    border-radius:50%;
    background:rgba(255,255,255,0.18);
    color:#f8fafc;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:0.2s;
}

.password-toggle:hover{
    background:rgba(255,255,255,0.28);
}

h2{
    color:white;
    text-align:center;
    margin-bottom:25px;
    font-size:32px;
}

.input-box{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,0.15);
    color:white;
    font-size:15px;
}

.input-box::placeholder{
    color:#e5e7eb;
}

.sr-only{
    position:absolute;
    width:1px;
    height:1px;
    padding:0;
    margin:-1px;
    overflow:hidden;
    clip:rect(0,0,0,0);
    white-space:nowrap;
    border:0;
}

.btn{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    color:white;
    font-size:16px;
    cursor:pointer;
    background:linear-gradient(
        45deg,
        #06b6d4,
        #3b82f6,
        #8b5cf6
    );
    transition:0.4s;
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 25px rgba(59,130,246,0.8);
}

.links{
    text-align:center;
    margin-top:20px;
}

.links a{
    color:#bfdbfe;
    text-decoration:none;
}

.links a:hover{
    color:white;
}
</style>
</head>

<body>

<div class="login-box">
    <div class="brand-icon">🙂</div>
    <h2>Sign In</h2>

    <label for="username" class="sr-only">Username</label>
    <input id="username" type="text" class="input-box" placeholder="Username" autocomplete="username">


    <label for="password" class="sr-only">Password</label>
    <div class="input-group">
        <input id="password" type="password" class="input-box" placeholder="Password" autocomplete="current-password">
        <button type="button" class="password-toggle" aria-label="Show password">👁️</button>
    </div>

    <button id="signInButton" type="button" class="btn">Sign In</button>

    <div class="links">
        <p>New to our service? <a href="create.html">Create an account</a></p>
    </div>
</div>

<script>
const brandIcon = document.querySelector('.brand-icon');
const usernameInput = document.getElementById('username');
const passwordInput = document.getElementById('password');
const toggleButton = document.querySelector('.password-toggle');

const updateIcon = () => {
    if (passwordInput.value.length > 0) {
        brandIcon.textContent = '🙈';
        return;
    }
    brandIcon.textContent = usernameInput.value.trim() ? '😊' : '🙂';
};

usernameInput.addEventListener('input', updateIcon);
passwordInput.addEventListener('input', updateIcon);
passwordInput.addEventListener('focus', () => brandIcon.textContent = '🙈');
passwordInput.addEventListener('blur', updateIcon);

toggleButton.addEventListener('click', () => {
    const isPassword = passwordInput.type === 'password';
    passwordInput.type = isPassword ? 'text' : 'password';
    toggleButton.textContent = isPassword ? '🙈' : '👁️';
    toggleButton.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
});

const signInButton = document.getElementById('signInButton');
signInButton.addEventListener('click', () => {
    window.location.href = 'dashboard.html';
});
</script>

</body>
</html>

TYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Segoe UI, Arial, sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f172a, #1e40af, #0ea5e9);
    color: #f8fafc;
}

.container {
    width: 360px;
    padding: 32px;
    border-radius: 28px;
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.22);
    box-shadow: 0 14px 40px rgba(0, 0, 0, 0.25);
    backdrop-filter: blur(16px);
}

.robot-card {
    display: flex;
    justify-content: center;
    margin-bottom: 18px;
}

.robot-face {
    width: 90px;
    height: 90px;
    border-radius: 28px;
    background: radial-gradient(circle at top, #e2e8f0, #94a3b8);
    position: relative;
    box-shadow: inset 0 6px 12px rgba(255,255,255,0.35), 0 12px 25px rgba(0,0,0,0.18);
    transition: transform 0.3s ease;
}

.robot-face.smile {
    transform: translateY(-2px);
}

.robot-eye {
    position: absolute;
    top: 28px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #0f172a;
    box-shadow: inset 0 2px 2px rgba(255,255,255,0.8);
}

.robot-eye.left {
    left: 22px;
}

.robot-eye.right {
    right: 22px;
}

.robot-mouth {
    position: absolute;
    bottom: 20px;
    left: 50%;
    width: 38px;
    height: 16px;
    transform: translateX(-50%);
    border-radius: 0 0 999px 999px;
    border-bottom: 4px solid #0f172a;
    transition: all 0.3s ease;
}

.robot-face.smile .robot-mouth {
    width: 50px;
    height: 25px;
    bottom: 16px;
    border-bottom-width: 6px;
    border-bottom-color: #0f172a;
}

h2 {
    text-align: center;
    margin-bottom: 8px;
    font-size: 28px;
}

p.subtitle {
    text-align: center;
    color: #cbd5e1;
    margin-bottom: 24px;
    font-size: 14px;
}

.form-group {
    margin-bottom: 16px;
}

.input-box {
    width: 100%;
    padding: 14px 16px;
    border: none;
    border-radius: 14px;
    background: rgba(255,255,255,0.14);
    color: #f8fafc;
    font-size: 15px;
}

.input-box::placeholder {
    color: #cbd5e1;
}

.button-submit {
    width: 100%;
    padding: 14px 16px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #38bdf8, #6366f1);
    color: white;
    font-size: 16px;
    cursor: pointer;
    margin-top: 6px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.button-submit:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 18px rgba(15, 23, 42, 0.18);
}

.success-message {
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 14px;
    background: rgba(16, 185, 129, 0.16);
    color: #a7f3d0;
    border: 1px solid rgba(16, 185, 129, 0.28);
    display: none;
    text-align: center;
}
</style>
</head>
<body>

<div class="container">
    <div class="robot-card">
        <div class="robot-face" id="robotFace">
            <div class="robot-eye left"></div>
            <div class="robot-eye right"></div>
            <div class="robot-mouth"></div>
        </div>
    </div>
    <h2>Create Account</h2>
    <p class="subtitle">Complete all fields to set up your professional account.</p>

    <form id="createForm">
        <div class="form-group">
            <input id="firstName" name="firstName" type="text" class="input-box" placeholder="First Name" autocomplete="given-name" required>
        </div>
        <div class="form-group">
            <input id="lastName" name="lastName" type="text" class="input-box" placeholder="Last Name" autocomplete="family-name" required>
        </div>
        <div class="form-group">
            <input id="email" name="email" type="email" class="input-box" placeholder="Email address" autocomplete="email" required>
        </div>
        <div class="form-group">
            <input id="birthDate" name="birthDate" type="date" class="input-box" required>
        </div>
        <div class="form-group">
            <select id="gender" name="gender" class="input-box" required>
                <option value="" disabled selected>Select Gender</option>
                <option value="female">Female</option>
                <option value="male">Male</option>
                <option value="nonbinary">Non-binary</option>
                <option value="preferNotToSay">Prefer not to say</option>
            </select>
        </div>
        <div class="form-group">
            <input id="password" name="password" type="password" class="input-box" placeholder="Password" autocomplete="new-password" required>
        </div>
        <div class="form-group">
            <input id="confirmPassword" name="confirmPassword" type="password" class="input-box" placeholder="Confirm Password" autocomplete="new-password" required>
        </div>
        <button type="submit" class="button-submit">Create Account</button>
    </form>
</div>

<script>
const form = document.getElementById('createForm');
const robotFace = document.getElementById('robotFace');

form.addEventListener('submit', event => {
    event.preventDefault();
    robotFace.classList.add('smile');
    setTimeout(() => {
        window.location.href = 'create-account.html';
    }, 500);
});
</script>

</body>
</html>
